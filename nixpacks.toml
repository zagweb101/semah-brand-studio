# Nixpacks build configuration for SEMAH AI Brand Studio
# Uses `next start` (standard) instead of standalone for reliability.
# Ensures Node.js 22 + Bun (avoids EOL Node 18 default).

[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = [
  "bun run db:generate",
  "bunx next build"
]

[start]
# فك تشفير إعدادات z-ai من ZAI_CONFIG_B64 قبل بدء التطبيق
cmd = "echo \"$ZAI_CONFIG_B64\" | base64 -d > .z-ai-config && bunx next start -p ${PORT:-3000}"
