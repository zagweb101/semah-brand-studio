# ─────────────────────────────────────────────────────────────
# Railway deployment config for SEMAH AI Brand Studio
# Build phases are defined in nixpacks.toml (Node 22 + Bun).
# ─────────────────────────────────────────────────────────────

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
