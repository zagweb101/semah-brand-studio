# ─────────────────────────────────────────────────────────────
# Railway (Nixpacks) deployment config for SEMAH AI Brand Studio
# ─────────────────────────────────────────────────────────────
# Builds a Next.js standalone output with Bun, then serves it
# with `bun run start` (which runs .next/standalone/server.js).
# The build script in package.json already copies .next/static
# and public/ into .next/standalone/ for a self-contained image.

[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[build.nixpacksPlan.phases.install]
cmds = ["bun install --frozen-lockfile"]

[build.nixpacksPlan.phases.build]
cmds = [
  "bun run db:generate",
  "bun run build"
]

[deploy]
startCommand = "bun run start"
healthcheckPath = "/api/auth/session"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
